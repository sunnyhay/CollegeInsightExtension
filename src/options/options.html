<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { max-width: 480px; margin: 40px auto; padding: 20px; font-family: system-ui, sans-serif; color: #1e1e2e; }
    h1 { font-size: 18px; margin-bottom: 16px; }
    .section { margin-bottom: 20px; }
    .section h2 { font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .status-card { padding: 12px; border-radius: 8px; margin-bottom: 8px; }
    .status-card.ok { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .status-card.warn { background: #fffbeb; border: 1px solid #fde68a; }
    .info { font-size: 13px; color: #475569; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>CollegeInsight Autofill — Settings</h1>

  <div class="section">
    <h2>Account</h2>
    <div id="account-status" class="status-card warn">
      <div class="info">Checking connection...</div>
    </div>
  </div>

  <div class="section">
    <h2>About</h2>
    <div class="info">
      Version 1.0.0<br>
      This extension fills college application forms using data from your CollegeInsight profile.
      It never submits forms automatically — you always review before submitting.
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
